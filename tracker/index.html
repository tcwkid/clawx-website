<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <title>CLAWX 追踪者 · Tracker Hub</title>
  <meta name="description" content="进度条出品 · 霍尔木兹海峡追踪 · 厄尔尼诺大宗商品 · 2026美国中期选举" />
  <meta property="og:title" content="CLAWX 追踪者" />
  <meta property="og:description" content="霍尔木兹 · 厄尔尼诺 · 中期选举 · 进度条出品" />
  <meta property="og:url" content="https://www.clawx.gold/tracker/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent-hz: #58a6ff;
      --accent-el: #f97316;
      --accent-us: #e63946;
      --header-h: 44px;
      --tab-h: 52px;
      --footer-h: 0px;
      --bottom-h: 52px; /* tab only */
      --active-accent: var(--accent-hz);
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      overflow: hidden;
    }

    /* ── Header（压缩版，44px） ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(13,17,23,.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 200;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, #58a6ff, #f97316, #e63946);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
      flex-shrink: 0;
    }
    .logo-text { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }
    .logo-sub  { font-size: 10px; color: var(--muted); display: none; }
    @media(min-width:480px){ .logo-sub { display: block; } }
    /* 官网改成小图标链接 */
    .header-link {
      color: var(--muted); text-decoration: none;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: 1px solid var(--border);
      transition: border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .header-link:active { border-color: var(--muted); color: var(--text); }
    .header-link svg { width: 15px; height: 15px; fill: currentColor; }

    /* ── iframe 容器 ── */
    .iframe-wrap {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      bottom: var(--bottom-h);
      display: none; overflow: hidden;
    }
    .iframe-wrap.active { display: block; }
    .iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* 加载遮罩 */
    .loader {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      z-index: 10; transition: opacity .4s;
    }
    .loader.hide { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 13px; color: var(--muted); }

    /* ── 三色渐变分隔线（tab bar 顶部） ── */
    .gradient-divider {
      position: fixed;
      bottom: var(--bottom-h);
      left: 0; right: 0;
      height: 3px;
      z-index: 201;
      background: linear-gradient(90deg, var(--accent-hz) 0%, var(--accent-el) 50%, var(--accent-us) 100%);
      opacity: .85;
    }

    /* ── Tab Bar（胶囊选择器，底部 footer 上方） ── */
    .tab-bar {
      position: fixed;
      bottom: var(--footer-h);
      left: 0; right: 0;
      height: var(--tab-h);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px; z-index: 200;
    }
    /* 胶囊容器 */
    .tab-capsule {
      display: flex;
      background: var(--bg);
      border-radius: 14px;
      padding: 4px;
      gap: 2px;
      width: 100%; max-width: 480px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 5px;
      cursor: pointer; padding: 7px 6px;
      border-radius: 10px;
      transition: background .2s, transform .15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
      position: relative;
    }
    .tab:active { transform: scale(.96); }
    .tab .tab-emoji { font-size: 14px; line-height: 1; }
    .tab .tab-label {
      font-size: 12px; color: var(--muted); font-weight: 500;
      transition: color .2s; white-space: nowrap;
    }
    /* 激活态：背景色填充 */
    .tab.active[data-id="hz"] { background: rgba(88,166,255,.18); }
    .tab.active[data-id="el"] { background: rgba(249,115,22,.18); }
    .tab.active[data-id="us"] { background: rgba(230,57,70,.18); }
    .tab.active[data-id="hz"] .tab-label { color: var(--accent-hz); font-weight: 600; }
    .tab.active[data-id="el"] .tab-label { color: var(--accent-el); font-weight: 600; }
    .tab.active[data-id="us"] .tab-label { color: var(--accent-us); font-weight: 600; }

    /* ── Footer（统计 + 分享，紧凑版） ── */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 200; gap: 8px;
    }
    /* 统计区域：数字做大 */
    .footer-stats {
      display: flex; align-items: baseline; gap: 10px; flex: 1; min-width: 0;
    }
    .stat-item { display: flex; align-items: baseline; gap: 3px; }
    .stat-num  { font-size: 17px; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-unit { font-size: 11px; color: var(--muted); }
    .stat-sep  { font-size: 11px; color: var(--border); }
    /* 分享按钮（右侧显眼） */
    .share-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      background: linear-gradient(135deg, rgba(88,166,255,.18), rgba(249,115,22,.18));
      border: 1px solid rgba(88,166,255,.3);
      border-radius: 18px;
      color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      transition: background .2s, transform .15s;
    }
    .share-btn:active { transform: scale(.94); background: rgba(88,166,255,.28); }

    /* ── 分享弹窗 ── */
    .share-mask {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 500;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .share-mask.show { display: flex !important; }
    .share-sheet {
      background: #161b22; border-radius: 20px 20px 0 0;
      padding: 20px 20px 40px; width: 100%; max-width: 520px;
      animation: sheet-up .25s ease;
    }
    @keyframes sheet-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .share-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .share-desc  { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 16px; }

    .share-tab-select { display: flex; gap: 8px; margin-bottom: 14px; }
    .share-tab-btn {
      flex: 1; padding: 7px 0; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); font-size: 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: all .15s;
    }
    .share-tab-btn.active { color: var(--text); border-color: var(--muted); background: var(--surface); }

    .share-preview {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; position: relative;
    }
    .sp-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .sp-text  { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-line; padding-right: 52px; }
    .copy-btn {
      position: absolute; right: 10px; top: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; padding: 3px 10px;
      border-radius: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .share-options { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .share-opt {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .share-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: transform .15s;
    }
    .share-opt:active .share-icon { transform: scale(.88); }
    .share-opt span { font-size: 11px; color: var(--muted); }
    .share-cancel {
      width: 100%; padding: 13px; background: var(--surface); border: none;
      color: var(--muted); font-size: 15px; border-radius: 12px; cursor: pointer;
    }

    /* Toast */
    #hub-toast {
      position: fixed; bottom: calc(var(--bottom-h) + 16px); left: 50%;
      transform: translateX(-50%);
      background: #1c2333; color: var(--text); padding: 10px 22px;
      border-radius: 20px; font-size: 13px; z-index: 999;
      pointer-events: none; opacity: 0; transition: opacity .3s; white-space: nowrap;
    }
  </style>
</head>

  <script>
    const TABS = {
      hz: { url: 'https://hz.clawx.gold/?embed=1', loaded: false },
      el: { url: '/elnino/',                         loaded: false },
      us: { url: '/election/',                       loaded: false },
    };

    // 访问统计基数
    const PV_BASE = 19347;
    const UV_BASE = 15105;

    let currentTab = 'hz';
    let shareTab   = 'hz';

    (function init() {
      loadIframe('hz');

      // 不蒜子基数叠加
      (function applyBase() {
        const pvEl = document.getElementById('busuanzi_value_site_pv');
        const uvEl = document.getElementById('busuanzi_value_site_uv');
        const pvD  = document.getElementById('busuanzi_pv_display');
        const uvD  = document.getElementById('busuanzi_uv_display');
        if (pvEl && pvEl.innerText && pvEl.innerText !== '' && pvEl.innerText !== '0' && pvD && uvD && uvEl) {
          pvD.innerText = parseInt(pvEl.innerText) + PV_BASE;
          uvD.innerText = parseInt(uvEl.innerText) + UV_BASE;
        } else {
          setTimeout(applyBase, 500);
        }
      })();
    })();

    function switchTab(id) {
      if (currentTab === id) return;
      currentTab = id;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
      document.querySelectorAll('.iframe-wrap').forEach(w => w.classList.toggle('active', w.id === 'wrap-' + id));
      if (!TABS[id].loaded) loadIframe(id);
      syncShareTab(id);
    }

    function loadIframe(id) {
      const iframe = document.getElementById('iframe-' + id);
      const loader = document.getElementById('loader-' + id);
      iframe.src = TABS[id].url;
      TABS[id].loaded = true;
      iframe.onload = () => {
        if (loader) { loader.classList.add('hide'); setTimeout(() => loader.style.display = 'none', 400); }
      };
    }

    // ── 分享文案 ──────────────────────────────────────────────
    const SHARE_TEXTS = {
      hz: () => `🛢️ 霍尔木兹海峡实时追踪 · ${new Date().toLocaleDateString('zh-CN')}

伊朗封锁霍尔木兹，每天135艘船过境
WTI破百，油价牵动全球通胀

⚠️ 停的是两周，不是终局
👀 进度条实时盯盘，数据每小时更新
🔗 https://www.clawx.gold/tracker/
@自由的进度条`,

      el: () => `🌡️ 厄尔尼诺大宗商品影响追踪 · ${new Date().toLocaleDateString('zh-CN')}

棕榈油历史涨幅+169% · 天然橡胶+120%
三波时间轴：资金布局→主升浪→减产出货

⚠️ 涨价是有顺序的，进度条带你看清节奏
👀 8大品种实时追踪 + 产区天气预警
🔗 https://www.clawx.gold/tracker/
@自由的进度条`,

      us: () => `🗳️ 2026美国中期选举追踪 · ${new Date().toLocaleDateString('zh-CN')}

众议院控制权争夺战
民主党泛化胜率领先，特朗普支持率承压

⚠️ 选举结果决定关税政策走向
👀 进度条实时追踪，数据每日更新
🔗 https://www.clawx.gold/tracker/
@自由的进度条`,
    };

    function syncShareTab(id) {
      shareTab = id;
      document.querySelectorAll('.share-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
      const el = document.getElementById('shareText');
      if (el) el.textContent = SHARE_TEXTS[id]();
    }

    function selectShareTab(id, btn) {
      shareTab = id;
      document.querySelectorAll('.share-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('shareText').textContent = SHARE_TEXTS[id]();
    }

    function openShare() {
      syncShareTab(currentTab);
      document.getElementById('shareMask').classList.add('show');
    }

    function closeShare() { document.getElementById('shareMask').classList.remove('show'); }

    function handleMaskClick(e) {
      if (e.target === document.getElementById('shareMask')) closeShare();
    }

    function copyText() {
      const text = SHARE_TEXTS[shareTab]();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('已复制，去粘贴吧 ✅'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); showToast('已复制 ✅');
      }
    }

    function shareWeibo() {
      window.open(`https://service.weibo.com/share/share.php?title=${encodeURIComponent(SHARE_TEXTS[shareTab]())}&url=${encodeURIComponent('https://www.clawx.gold/tracker/')}`, '_blank');
      closeShare();
    }
    function shareWechat()       { showToast('请截图后分享到微信 📱'); closeShare(); }
    function shareVideoAccount() { showToast('请截图后分享到视频号 🎬'); closeShare(); }
    function nativeShare() {
      if (navigator.share) {
        navigator.share({ title: '进度条追踪中心', text: SHARE_TEXTS[shareTab](), url: 'https://www.clawx.gold/tracker/' }).catch(()=>{});
      } else { copyText(); }
      closeShare();
    }

    function showToast(msg) {
      const t = document.getElementById('hub-toast');
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2200);
    }
  </script>
</body>
</html>
