  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent-hz: #58a6ff;      /* 霍尔木兹 蓝 */
      --accent-el: #f97316;      /* 厄尔尼诺 橙 */
      --accent-us: #e63946;      /* 中期选举 红 */
      --tab-h: 56px;
      --header-h: 52px;
      --footer-h: 72px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 200;
    }
    .header-logo {
      display: flex; align-items: center; gap: 8px;
    }
    .header-logo .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #58a6ff, #f97316, #e63946);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .header-logo .logo-text {
      font-size: 15px; font-weight: 700; color: var(--text);
    }
    .header-logo .logo-sub {
      font-size: 11px; color: var(--muted);
      display: none;
    }
    @media(min-width:480px){
      .header-logo .logo-sub { display: block; }
    }
    .header-link {
      font-size: 12px; color: var(--muted);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: border-color .2s, color .2s;
    }
    .header-link:active { color: var(--text); border-color: var(--muted); }

    /* ── Tab Bar ── */
    .tab-bar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--tab-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      z-index: 200;
      overflow: hidden;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      gap: 2px;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tab:active { background: rgba(255,255,255,.04); }
    .tab .tab-emoji { font-size: 18px; line-height: 1; }
    .tab .tab-label { font-size: 11px; color: var(--muted); font-weight: 500; transition: color .2s; }
    .tab .tab-indicator {
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 2px;
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    /* Active states */
    .tab.active[data-id="hz"] .tab-label { color: var(--accent-hz); }
    .tab.active[data-id="el"] .tab-label { color: var(--accent-el); }
    .tab.active[data-id="us"] .tab-label { color: var(--accent-us); }
    .tab.active[data-id="hz"] .tab-indicator { background: var(--accent-hz); transform: scaleX(1); }
    .tab.active[data-id="el"] .tab-indicator { background: var(--accent-el); transform: scaleX(1); }
    .tab.active[data-id="us"] .tab-indicator { background: var(--accent-us); transform: scaleX(1); }

    /* ── iframe 容器 ── */
    .iframe-wrap {
      position: fixed;
      top: calc(var(--header-h) + var(--tab-h));
      left: 0; right: 0;
      bottom: var(--footer-h);
      display: none;
      overflow: hidden;
    }
    .iframe-wrap.active { display: block; }
    .iframe-wrap iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* 加载遮罩 */
    .iframe-wrap .loader {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      transition: opacity .4s;
    }
    .iframe-wrap .loader.hide { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 13px; color: var(--muted); }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      z-index: 200;
    }
    .footer-brand {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .footer-stats {
      font-size: 12px;
      color: var(--muted);
    }
    .footer-stats .stat-num {
      color: var(--text);
      font-weight: 700;
    }

    /* ── 悬浮分享FAB ── */
    .share-fab {
      position: fixed;
      right: 16px;
      bottom: calc(var(--footer-h) + 16px);
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #58a6ff, #f97316);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 300;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(88,166,255,.3);
      animation: fab-in .35s cubic-bezier(.34,1.56,.64,1);
      -webkit-tap-highlight-color: transparent;
    }
    .share-fab:active { transform: scale(.9); }
    @keyframes fab-in { from{transform:scale(0)} to{transform:scale(1)} }

    /* ── 分享弹窗 ── */
    .share-mask {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 500;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .share-mask.show { display: flex !important; }
    .share-sheet {
      background: #161b22;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 40px;
      width: 100%;
      max-width: 520px;
      animation: sheet-up .25s ease;
    }
    @keyframes sheet-up { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .share-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .share-desc  { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 16px; }

    /* tab 选择器 in share sheet */
    .share-tab-select {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .share-tab-btn {
      flex: 1; padding: 7px 0; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted); font-size: 12px;
      cursor: pointer; transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .share-tab-btn.active { color: var(--text); border-color: var(--muted); background: var(--surface); }

    .share-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      position: relative;
    }
    .sp-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .sp-text  { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-line; padding-right: 52px; }
    .copy-btn {
      position: absolute; right: 10px; top: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; padding: 3px 10px;
      border-radius: 6px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn:active { background: var(--border); }

    .share-options {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px;
    }
    .share-opt {
      display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .share-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: transform .15s;
    }
    .share-opt:active .share-icon { transform: scale(.88); }
    .share-opt span { font-size: 11px; color: var(--muted); }

    .share-cancel {
      width: 100%; padding: 13px;
      background: var(--surface); border: none;
      color: var(--muted); font-size: 15px;
      border-radius: 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .share-cancel:active { background: var(--border); }

    /* Toast */
    #hub-toast {
      position: fixed; bottom: calc(var(--footer-h) + 72px); left: 50%;
      transform: translateX(-50%);
      background: #1c2333; color: var(--text);
      padding: 10px 22px; border-radius: 20px;
      font-size: 13px; z-index: 999;
      pointer-events: none; opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
    }
  </style>
</head>

    // ── 配置 ──────────────────────────────────────────────────
    const TABS = {
      hz: { url: 'https://hz.clawx.gold/', loaded: false },
      el: { url: '/elnino/',               loaded: false },
      us: { url: '/election/',             loaded: false },
    };
    const BASE_COUNT = 8888;   // 访问统计基数
    let currentTab = 'hz';
    let shareTab   = 'hz';

    // ── 初始化：预加载第一个 iframe ───────────────────────────
    (function init() {
      loadIframe('hz');

      // 不蒜子基数叠加
      (function applyBase() {
        const pvEl = document.getElementById('busuanzi_value_site_pv');
        const uvEl = document.getElementById('busuanzi_value_site_uv');
        const pvD  = document.getElementById('busuanzi_pv_display');
        const uvD  = document.getElementById('busuanzi_uv_display');
        if (pvEl && pvEl.innerText && pvEl.innerText !== '' && pvEl.innerText !== '0' && pvD && uvD && uvEl) {
          pvD.innerText = parseInt(pvEl.innerText) + BASE_COUNT;
          uvD.innerText = parseInt(uvEl.innerText) + BASE_COUNT;
        } else {
          setTimeout(applyBase, 500);
        }
      })();
    })();

    // ── Tab 切换 ─────────────────────────────────────────────
    function switchTab(id) {
      if (currentTab === id) return;
      currentTab = id;

      // 更新 tab 激活
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.id === id);
      });
      // 切换 iframe 容器
      document.querySelectorAll('.iframe-wrap').forEach(w => {
        w.classList.toggle('active', w.id === 'wrap-' + id);
      });
      // 懒加载
      if (!TABS[id].loaded) loadIframe(id);

      // 同步分享tab
      syncShareTab(id);
    }

    function loadIframe(id) {
      const iframe = document.getElementById('iframe-' + id);
      const loader = document.getElementById('loader-' + id);
      iframe.src = TABS[id].url;
      TABS[id].loaded = true;
      iframe.onload = () => {
        if (loader) {
          loader.classList.add('hide');
          setTimeout(() => loader.style.display = 'none', 400);
        }
      };
    }

    // ── 分享 ─────────────────────────────────────────────────
    const SHARE_TEXTS = {

      el: () => `🌡️ 厄尔尼诺大宗商品影响追踪 · ${new Date().toLocaleDateString('zh-CN')}

      us: () => `🗳️ 2026美国中期选举追踪 · ${new Date().toLocaleDateString('zh-CN')}

    function syncShareTab(id) {
      shareTab = id;
      document.querySelectorAll('.share-tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === id);
      });
      const el = document.getElementById('shareText');
      if (el) el.textContent = SHARE_TEXTS[id]();
    }

    function selectShareTab(id, btn) {
      shareTab = id;
      document.querySelectorAll('.share-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('shareText').textContent = SHARE_TEXTS[id]();
    }

    function openShare() {
      syncShareTab(currentTab);
      document.getElementById('shareMask').classList.add('show');
    }

    function closeShare() {
      document.getElementById('shareMask').classList.remove('show');
    }

    function handleMaskClick(e) {
      if (e.target === document.getElementById('shareMask')) closeShare();
    }

    function copyText() {
      const text = SHARE_TEXTS[shareTab]();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('已复制，去粘贴吧 ✅'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制 ✅');
      }
    }

    function shareWeibo() {
      const url = encodeURIComponent('https://www.clawx.gold/tracker/');
      const txt = encodeURIComponent(SHARE_TEXTS[shareTab]());
      window.open(`https://service.weibo.com/share/share.php?title=${txt}&url=${url}`, '_blank');
      closeShare();
    }

    function shareWechat()      { showToast('请截图后分享到微信 📱'); closeShare(); }
    function shareVideoAccount(){ showToast('请截图后分享到视频号 🎬'); closeShare(); }

    function nativeShare() {
      if (navigator.share) {
        navigator.share({
          title: '进度条追踪中心',
          text: SHARE_TEXTS[shareTab](),
          url: 'https://www.clawx.gold/tracker/',
        }).catch(() => {});
      } else {
        copyText();
      }
      closeShare();
    }

    function showToast(msg) {
      const t = document.getElementById('hub-toast');
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2200);
    }
